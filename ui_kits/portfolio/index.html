<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hector Herrera — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; }
  body { margin: 0; background: #0D0D0D; color: #F0EDE6; font-family: 'Outfit', sans-serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0D0D0D; }
  ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 3px; }
  input, textarea, button { font-family: inherit; }
  * { -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="HeroSection.jsx"></script>
<script type="text/babel" src="ProjectCard.jsx"></script>
<script type="text/babel" src="ProjectsGrid.jsx"></script>
<script type="text/babel" src="AboutSection.jsx"></script>
<script type="text/babel" src="ContactSection.jsx"></script>
<script type="text/babel" src="ExpertiseSection.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#C8965A",
  "bgColor": "#0D0D0D",
  "fgColor": "#F0EDE6",
  "fontDisplay": "DM Serif Display",
  "showScrollHint": true
}/*EDITMODE-END*/;

// ── Page transition wrapper ─────────────────────────────────
const PageTransition = ({ children, pageKey }) => {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    setVisible(false);
    const t = setTimeout(() => setVisible(true), 30);
    return () => clearTimeout(t);
  }, [pageKey]);

  return (
    <div style={{
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0)' : 'translateY(10px)',
      transition: 'opacity 400ms cubic-bezier(0.16,1,0.3,1), transform 400ms cubic-bezier(0.16,1,0.3,1)',
    }}>
      {children}
    </div>
  );
};

// ── Featured projects on home ───────────────────────────────
const FeaturedProjects = ({ setPage }) => {
  const featured = (window.PROJECTS || []).slice(0, 3);

  return (
    <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 64px 120px' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: '40px' }}>
        <div>
          <div style={{ fontFamily: "'Outfit',sans-serif", fontSize: '11px', fontWeight: 500, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#6B6B6B', marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '12px' }}>
            <span style={{ width: '24px', height: '1px', background: '#C8965A', display: 'inline-block' }}></span>
            Selected work
          </div>
          <h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: '40px', color: '#F0EDE6', lineHeight: 1.1, letterSpacing: '-0.02em', margin: 0 }}>
            Recent projects
          </h2>
        </div>
        <button onClick={() => setPage('projects')} style={{ fontFamily: "'Outfit',sans-serif", fontSize: '13px', fontWeight: 500, background: 'transparent', color: '#C8965A', border: '1px solid rgba(200,150,90,0.3)', padding: '8px 18px', borderRadius: '4px', cursor: 'pointer' }}>
          See All →
        </button>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '20px' }}>
        {featured.map(p => <ProjectCard key={p.id} project={p} onClick={() => setPage('projects')} />)}
      </div>
    </div>
  );
};

// ── Tweaks panel ────────────────────────────────────────────
const TweaksPanel = ({ tweaks, setTweaks, visible }) => {
  if (!visible) return null;

  const panelStyle = {
    position: 'fixed', bottom: '24px', right: '24px', zIndex: 9999,
    background: '#161616', border: '1px solid rgba(240,237,230,0.12)',
    borderRadius: '8px', padding: '20px', width: '240px',
    boxShadow: '0 16px 64px rgba(0,0,0,0.6)',
    fontFamily: "'Outfit', sans-serif",
  };

  const labelStyle = { fontSize: '11px', color: '#6B6B6B', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: '6px', display: 'block' };
  const rowStyle = { marginBottom: '14px' };

  const update = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    document.documentElement.style.setProperty('--accent', next.accentColor);
    document.documentElement.style.setProperty('--bg', next.bgColor);
    document.body.style.background = next.bgColor;
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  return (
    <div style={panelStyle}>
      <div style={{ fontSize: '13px', fontWeight: 600, color: '#F0EDE6', marginBottom: '16px', letterSpacing: '0.01em' }}>Tweaks</div>
      <div style={rowStyle}>
        <label style={labelStyle}>Accent color</label>
        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
          <input type="color" value={tweaks.accentColor} onChange={e => update('accentColor', e.target.value)}
            style={{ width: '36px', height: '28px', border: 'none', background: 'none', cursor: 'pointer', padding: 0 }} />
          <span style={{ fontSize: '12px', color: '#6B6B6B', fontFamily: 'monospace' }}>{tweaks.accentColor}</span>
        </div>
      </div>
      <div style={rowStyle}>
        <label style={labelStyle}>Background</label>
        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
          <input type="color" value={tweaks.bgColor} onChange={e => update('bgColor', e.target.value)}
            style={{ width: '36px', height: '28px', border: 'none', background: 'none', cursor: 'pointer', padding: 0 }} />
          <span style={{ fontSize: '12px', color: '#6B6B6B', fontFamily: 'monospace' }}>{tweaks.bgColor}</span>
        </div>
      </div>
      <div style={rowStyle}>
        <label style={labelStyle}>Display font</label>
        <select value={tweaks.fontDisplay} onChange={e => update('fontDisplay', e.target.value)}
          style={{ width: '100%', background: '#111', border: '1px solid rgba(240,237,230,0.1)', color: '#F0EDE6', padding: '6px 10px', borderRadius: '4px', fontSize: '12px', fontFamily: 'inherit' }}>
          <option>DM Serif Display</option>
          <option>Georgia</option>
          <option>Outfit</option>
        </select>
      </div>
    </div>
  );
};

// ── Root App ────────────────────────────────────────────────
const App = () => {
  const saved = (() => { try { return localStorage.getItem('hh_page') || 'home'; } catch { return 'home'; } })();
  const [page, setPageRaw] = React.useState(saved);
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);

  const setPage = (p) => {
    setPageRaw(p);
    try { localStorage.setItem('hh_page', p); } catch {}
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const renderPage = () => {
    switch (page) {
      case 'home': return (
        <>
          <HeroSection setPage={setPage} />
          <FeaturedProjects setPage={setPage} />
        </>
      );
      case 'about':     return <AboutSection setPage={setPage} />;
      case 'expertise':  return <ExpertiseSection />;
      case 'projects':   return <ProjectsGrid setPage={setPage} />;
      case 'contact':    return <ContactSection />;
      default:         return <HeroSection setPage={setPage} />;
    }
  };

  return (
    <>
      <Header currentPage={page} setPage={setPage} />
      <main>
        <PageTransition pageKey={page}>
          {renderPage()}
        </PageTransition>
      </main>
      <Footer setPage={setPage} />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<div id="root"></div>
</body>
</html>
