<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0D0D0D; font-family: 'Outfit', sans-serif; padding: 20px; }
.label { font-size: 10px; color: #6B6B6B; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.badge { display: inline-block; border-radius: 2px; font-size: 11px; font-weight: 500; padding: 3px 8px; font-family: 'Outfit', sans-serif; letter-spacing: 0.02em; }
.tag { display: inline-block; border-radius: 2px; font-size: 10px; padding: 2px 7px; font-family: 'JetBrains Mono', monospace; }
.divider { border: none; border-top: 1px solid rgba(240,237,230,0.08); margin: 4px 0 14px; }
</style>
</head>
<body>
<div class="label">Status badges</div>
<div class="row">
  <span class="badge" style="background:rgba(200,150,90,0.12);color:#C8965A;border:1px solid rgba(200,150,90,0.2);">Featured</span>
  <span class="badge" style="background:rgba(75,171,114,0.1);color:#4BAB72;border:1px solid rgba(75,171,114,0.2);">Live</span>
  <span class="badge" style="background:rgba(240,237,230,0.06);color:#6B6B6B;border:1px solid rgba(240,237,230,0.08);">Archived</span>
  <span class="badge" style="background:rgba(200,90,90,0.1);color:#C84B4B;border:1px solid rgba(200,90,90,0.2);">Discontinued</span>
  <span class="badge" style="background:rgba(200,169,75,0.1);color:#C8A94B;border:1px solid rgba(200,169,75,0.2);">In progress</span>
</div>
<hr class="divider">
<div class="label">Tech stack tags (mono)</div>
<div class="row">
  <span class="tag" style="color:#C8965A;background:rgba(200,150,90,0.08);border:1px solid rgba(200,150,90,0.15);">React</span>
  <span class="tag" style="color:#C8965A;background:rgba(200,150,90,0.08);border:1px solid rgba(200,150,90,0.15);">Next.js</span>
  <span class="tag" style="color:#C8965A;background:rgba(200,150,90,0.08);border:1px solid rgba(200,150,90,0.15);">Node</span>
  <span class="tag" style="color:#C8965A;background:rgba(200,150,90,0.08);border:1px solid rgba(200,150,90,0.15);">TypeScript</span>
  <span class="tag" style="color:#C8965A;background:rgba(200,150,90,0.08);border:1px solid rgba(200,150,90,0.15);">PostgreSQL</span>
  <span class="tag" style="color:#C8965A;background:rgba(200,150,90,0.08);border:1px solid rgba(200,150,90,0.15);">Tailwind</span>
  <span class="tag" style="color:#C8965A;background:rgba(200,150,90,0.08);border:1px solid rgba(200,150,90,0.15);">GraphQL</span>
</div>
<hr class="divider">
<div class="label">Category labels</div>
<div class="row">
  <span class="badge" style="color:#6B6B6B;border:none;padding:3px 0;letter-spacing:0.08em;text-transform:uppercase;font-size:10px;">Freelance</span>
  <span style="color:#3A3A3A;font-size:10px;padding:3px 4px;">·</span>
  <span class="badge" style="color:#6B6B6B;border:none;padding:3px 0;letter-spacing:0.08em;text-transform:uppercase;font-size:10px;">2024</span>
</div>
</body>
</html>
