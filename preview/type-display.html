<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0D0D0D; font-family: 'Outfit', sans-serif; padding: 20px; }
.label { font-size: 10px; color: #6B6B6B; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
.display-name {
  font-family: 'DM Serif Display', serif;
  font-size: 56px;
  color: #F0EDE6;
  line-height: 1.05;
  letter-spacing: -0.02em;
}
.display-name em { color: #C8965A; font-style: italic; }
.display-sub {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  color: #F0EDE6;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-top: 8px;
}
.hero-tag {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  color: #6B6B6B;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 16px;
  margin-bottom: 4px;
}
.hero-body {
  font-family: 'Outfit', sans-serif;
  font-size: 18px;
  color: #A8A49D;
  line-height: 1.6;
}
.divider { border: none; border-top: 1px solid rgba(240,237,230,0.08); margin: 16px 0; }
</style>
</head>
<body>
<div class="label">DM Serif Display — Hero</div>
<div class="display-name">Hector <em>Herrera</em></div>
<div class="display-sub">Full stack developer</div>
<hr class="divider">
<div class="hero-tag">Outfit 300 — Tagline</div>
<div class="hero-body">I build thoughtful, performant web products<br>from idea to deployment.</div>
</body>
</html>
