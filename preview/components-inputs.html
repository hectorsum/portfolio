<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0D0D0D; font-family: 'Outfit', sans-serif; padding: 20px; }
.label { font-size: 10px; color: #6B6B6B; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.form-group { margin-bottom: 14px; }
.field-label { font-size: 12px; color: #A8A49D; margin-bottom: 5px; display: block; font-weight: 500; }
.input {
  width: 100%; background: #161616; border: 1px solid rgba(240,237,230,0.08);
  border-radius: 4px; padding: 10px 14px; color: #F0EDE6;
  font-family: 'Outfit', sans-serif; font-size: 14px; outline: none;
}
.input::placeholder { color: #3A3A3A; }
.input.focus { border-color: #C8965A; box-shadow: 0 0 0 3px rgba(200,150,90,0.12); }
.input.error { border-color: #C84B4B; }
.error-msg { font-size: 11px; color: #C84B4B; margin-top: 4px; }
.textarea { resize: none; height: 72px; }
.divider { border: none; border-top: 1px solid rgba(240,237,230,0.08); margin: 4px 0 14px; }
</style>
</head>
<body>
<div class="form-group">
  <label class="field-label">Name</label>
  <input class="input" type="text" placeholder="Hector Herrera">
</div>
<div class="form-group">
  <label class="field-label">Email — focused</label>
  <input class="input focus" type="email" value="hector@example.com">
</div>
<div class="form-group">
  <label class="field-label">Subject — error</label>
  <input class="input error" type="text" value="">
  <div class="error-msg">This field is required</div>
</div>
<hr class="divider">
<div class="form-group">
  <label class="field-label">Message</label>
  <textarea class="input textarea" placeholder="Tell me about your project..."></textarea>
</div>
</body>
</html>
